<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>מבחן חיבור עיגולים</title>
  <script src="https://unpkg.com/jspsych@8.0.0/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-trail-making@0.2.0/dist/index.browser.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.0.0/css/jspsych.css">
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; direction: rtl; margin: 0; }
    .jspsych-display-element { direction: ltr; }
    canvas {
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .jspsych-display-element { padding: 0 !important; }
    .jspsych-content-wrapper { width: 100% !important; }
    .jspsych-content { max-width: 100% !important; padding: 4px !important; }
    .jspsych-display-element canvas { display: block; margin: 0 auto; }

    .instruction-box {
      background: white; border-radius: 16px;
      padding: 24px 20px;
      max-width: 640px; width: calc(100% - 32px);
      margin: 16px auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: right; direction: rtl;
      box-sizing: border-box;
    }
    .instruction-box h2 { color: #1a237e; font-size: 22px; margin-bottom: 12px; }
    .instruction-box p { font-size: 15px; line-height: 1.8; color: #333; }
    .instruction-box .example {
      background: #e8eaf6; border-radius: 10px;
      padding: 10px 14px; margin: 12px 0;
      font-size: 14px; color: #1a237e; font-weight: bold;
      overflow-x: auto;
    }
    .instruction-box .badge {
      display: inline-block; background: #1a237e; color: white;
      border-radius: 20px; padding: 4px 14px; font-size: 13px; margin-bottom: 12px;
    }
    .jspsych-btn {
      background: #1a237e !important; color: white !important;
      border: none !important; border-radius: 10px !important;
      padding: 14px 32px !important; font-size: 16px !important;
      cursor: pointer !important; margin-top: 10px !important;
      transition: background 0.2s !important;
      min-width: 120px !important;
    }
    .jspsych-btn:hover { background: #283593 !important; }
    .saving-msg { text-align: center; font-size: 18px; margin-top: 40px; color: #1a237e; padding: 20px; }

    @media (max-width: 600px) {
      .instruction-box { padding: 18px 14px; margin: 10px; width: calc(100% - 20px); }
      .instruction-box h2 { font-size: 18px; }
      .instruction-box p  { font-size: 14px; }
      .jspsych-btn { padding: 12px 24px !important; font-size: 15px !important; }
    }
    .jspsych-trail-making-circle[data-label="A"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="A"]::after { content: "א"; }
    .jspsych-trail-making-circle[data-label="B"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="B"]::after { content: "ב"; }
    .jspsych-trail-making-circle[data-label="C"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="C"]::after { content: "ג"; }
    .jspsych-trail-making-circle[data-label="D"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="D"]::after { content: "ד"; }
    .jspsych-trail-making-circle[data-label="E"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="E"]::after { content: "ה"; }
    .jspsych-trail-making-circle[data-label="F"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="F"]::after { content: "ו"; }
    .jspsych-trail-making-circle[data-label="G"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="G"]::after { content: "ז"; }
    .jspsych-trail-making-circle[data-label="H"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="H"]::after { content: "ח"; }
    .jspsych-trail-making-circle[data-label="I"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="I"]::after { content: "ט"; }
    .jspsych-trail-making-circle[data-label="J"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="J"]::after { content: "י"; }
    .jspsych-trail-making-circle[data-label="K"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="K"]::after { content: "כ"; }
    .jspsych-trail-making-circle[data-label="L"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="L"]::after { content: "ל"; }
    .jspsych-trail-making-circle[data-label="M"] span { visibility: hidden; }
    .jspsych-trail-making-circle[data-label="M"]::after { content: "מ"; }
  </style>
</head>
<body>
<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwjTGVngWvjR4A5zORQKan2YonCTxuiSxK728qGNBERyxChuyU1K6lbj9NJz3jDpJdkHw/exec'
const NEXT_TEST_URL = 'https://sintov.github.io/TMT_Heb/symbol_matching.html';

const jsPsych = initJsPsych({
  on_finish: async function() {
    document.body.innerHTML = `<div class="saving-msg">⏳ שומר תוצאות... אנא המתן/י</div>`;

    const allTrials = jsPsych.data.get().filter({ phase: 'real' }).values();
    const israelTime = new Date().toLocaleString('he-IL', {
      timeZone: 'Asia/Jerusalem',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const rows = allTrials.map(t => {
      const rtMs  = t.completion_time ?? null;
      const rtSec = rtMs ? (rtMs / 1000).toFixed(2) : null;
      const rtMin = rtMs ? (rtMs / 60000).toFixed(2) : null;
      return {
        subject_id: t.subject_id || 'anonymous',
        timestamp:  israelTime,
        part:       t.part,
        rt_ms:      rtMs,
        rt_seconds: rtSec,
        rt_minutes: rtMin,
        errors:     t.num_errors ?? 0
      };
    });

    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ rows })
      });
    } catch(e) {
      console.error('שגיאה בשמירה:', e);
    }

    window.location.href = NEXT_TEST_URL + '?subject_id=' + (subjectId || 'anonymous');
  }
});

const subjectId = new URLSearchParams(window.location.search).get('subject_id') || 'anonymous';
jsPsych.data.addProperties({ subject_id: subjectId });

function makeInstr(html) {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: html,
    choices: ['המשך'],
    button_html: (choice) => `<button class="jspsych-btn">${choice}</button>`
  };
}

function getCanvasDimensions() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cw = Math.min(Math.floor(w * 0.95), 800);
  const ch = Math.min(Math.floor(h * 0.65), 800); // 65% מהגובה כדי להשאיר מקום להוראות למעלה
  return [cw, ch];
}

function randomPositions(n, w, h, r) {
  let pts = [];
  let currentMinDist = Math.max(40, Math.min(w, h) * 0.12); 
  const margin = r + 15;
  
  while (currentMinDist > 5) {
    pts = [];
    let tries = 0;
    while (pts.length < n && tries < 5000) {
      const x = margin + Math.random() * (w - 2*margin);
      const y = margin + Math.random() * (h - 2*margin);
      if (!pts.some(p => Math.hypot(p.x-x, p.y-y) < currentMinDist)) {
        pts.push({x, y});
      }
      tries++;
    }
    if (pts.length === n) return pts; 
    currentMinDist -= 5; 
  }
  
  while (pts.length < n) {
     pts.push({
       x: margin + Math.random() * (w - 2*margin),
       y: margin + Math.random() * (h - 2*margin)
     });
  }
  return pts;
}

function buildATargets(numTargets) {
  const labels = [];
  for (let i = 1; i <= numTargets; i++) {
    labels.push(String(i));
  }
  const [cw, ch] = getCanvasDimensions();
  const pos = randomPositions(labels.length, cw, ch, 20);
  return labels.map((label, i) => ({ x: pos[i].x, y: pos[i].y, label }));
}

function buildBTargets(numPairs, endAtNumber = false) {
  const heb = ['א','ב','ג','ד','ה','ו','ז','ח','ט','י','כ','ל','מ'];
  const labels = [];
  for (let i = 0; i < numPairs; i++) {
    labels.push(String(i+1));
    // endAtNumber=true: skip the last Hebrew letter so test ends on the last number
    if (!endAtNumber || i < numPairs - 1) labels.push(heb[i]);
  }
  const [cw, ch] = getCanvasDimensions();
  const pos = randomPositions(labels.length, cw, ch, 20);
  return labels.map((label, i) => ({ x: pos[i].x, y: pos[i].y, label }));
}

// הוספת תוויות "התחלה" / "סוף" מעל הקנבס לפי קואורדינטות האמיתיות של העיגולים
function addStartEndLabels(targets, lastLabel) {
  // Use setTimeout to ensure the canvas is fully rendered and sized
  setTimeout(() => {
    const canvas = document.querySelector('canvas');
    if (!canvas || !canvas.width) return;

    const parent = canvas.parentElement;
    if (getComputedStyle(parent).position === 'static') parent.style.position = 'relative';

    // Use getBoundingClientRect for reliable offset within parent
    const canvasRect = canvas.getBoundingClientRect();
    const parentRect = parent.getBoundingClientRect();
    const offLeft = canvasRect.left - parentRect.left;
    const offTop  = canvasRect.top  - parentRect.top;

    // Scale: canvas internal coords → CSS pixels
    const scaleX = canvas.offsetWidth  / canvas.width;
    const scaleY = canvas.offsetHeight / canvas.height;
    const circleR = 38; // plugin circle radius in canvas coords

    [['1', 'התחלה', '#2e7d32'], [lastLabel, 'סוף', '#c62828']].forEach(([lbl, text, color]) => {
      const t = targets.find(t => t.label === lbl);
      if (!t) return;

      const tag = document.createElement('div');
      tag.textContent = text;
      tag.style.cssText = [
        'position:absolute', 'pointer-events:none', 'white-space:nowrap', 'z-index:10',
        'font-size:11px', 'font-weight:bold', 'border-radius:4px', 'padding:1px 5px',
        `color:${color}`, 'background:rgba(255,255,255,0.92)', `border:1px solid ${color}`,
        'transform:translateX(-50%)'
      ].join(';');

      tag.style.left = (offLeft + t.x * scaleX) + 'px';
      tag.style.top  = (offTop  + (t.y + circleR + 3) * scaleY) + 'px';
      parent.appendChild(tag);
    });
  }, 80);
}

function startCountdown(seconds) {
  const timerEl = document.createElement('div');
  timerEl.style.cssText = 'text-align:center;font-size:20px;font-weight:bold;margin:4px 0 6px;';
  const canvas = document.querySelector('canvas');
  if (canvas) canvas.before(timerEl); else return;

  let remaining = seconds;
  const tick = () => {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    timerEl.textContent = `⏱ ${m > 0 ? m + ':' + String(s).padStart(2,'0') : s + ' שניות'}`;
    timerEl.style.color = remaining <= 10 ? '#c62828' : '#555';
    if (remaining-- > 0) setTimeout(tick, 1000);
  };
  tick();
}

function makeTmt(prompt, phase, part, customTargets, lastLabel, timeLimitSec) {
  const [cw, ch] = getCanvasDimensions();
  const trial = {
    type: jsPsychTrailMaking,
    prompt: `<p style="font-size:17px;text-align:center;margin:10px 0;">${prompt}</p>`,
    canvas_size: [cw, ch],
    targets: customTargets,
    data: { phase, part },
    on_load: function() {
      if (lastLabel && customTargets) addStartEndLabels(customTargets, lastLabel);
      if (timeLimitSec) startCountdown(timeLimitSec);
    }
  };
  if (timeLimitSec) trial.trial_duration = timeLimitSec * 1000;
  return trial;
}

const welcome = makeInstr(`<div class="instruction-box"><h2>מבחן חיבור עיגולים</h2><p>ברוך/ה הבא/ה למבחן.</p><p>המבחן מורכב משני חלקים:</p><p><b>חלק א׳</b> – חיבור מספרים לפי הסדר (1, 2, 3...)<br><b>חלק ב׳</b> – חיבור מספרים ואותיות עברית לסירוגין (1, א, 2, ב...)</p><p>לפני כל חלק יש <b>תרגול קצר</b> שיעזור לך להבין את המשימה.</p><p style="color:#c62828;">⏱ הזמן נמדד – פעל/י מהר ככל האפשר מבלי לטעות.</p></div>`);
const instrAPractice = makeInstr(`<div class="instruction-box"><span class="badge">חלק א׳ – תרגול</span><h2>חיבור מספרים</h2><p>לחץ/י על המספרים <b>לפי הסדר</b> מהקטן לגדול:</p><div class="example">1 ← 2 ← 3 ← 4 ← 5</div><p>התחל/י מ-<b>1</b> וסיים/י בגבוה ביותר.</p></div>`);
const tmtAPractice = makeTmt('תרגול א׳ – חבר/י את המספרים לפי הסדר', 'practice', 'A', buildATargets(5), '5');
const instrAReal = makeInstr(`<div class="instruction-box"><span class="badge">חלק א׳ – מבחן אמיתי</span><h2>חיבור מספרים</h2><p>כעת תתחיל/י את המבחן האמיתי – <b>25 מספרים</b>.</p><p>חבר/י את המספרים לפי הסדר מ-1 עד 25.</p><div class="example">1 ← 2 ← 3 ← ... ← 25</div><p style="color:#c62828;">⏱ הזמן יימדד מרגע שתלחץ/י "המשך".</p></div>`);
const tmtAReal = makeTmt('חלק א׳ – חבר/י מספרים לפי הסדר (1 ← 2 ← ... ← 25)', 'real', 'A', buildATargets(25), '25', 100);
const instrBPractice = makeInstr(`<div class="instruction-box"><span class="badge">חלק ב׳ – תרגול</span><h2>חיבור מספרים ואותיות לסירוגין</h2><p>כעת יש לחבר <b>מספר ואחריו אות עברית</b> לסירוגין:</p><div class="example">1 ← א ← 2 ← ב ← 3 ← ג ← 4 ← ד</div><p>הסדר הוא: <b>מספר → אות → מספר → אות...</b></p></div>`);
const tmtBPractice = makeTmt('תרגול ב׳ – חבר/י לסירוגין: 1 ← א ← 2 ← ב ← ...', 'practice', 'B', buildBTargets(4), 'ד');
const instrBReal = makeInstr(`<div class="instruction-box"><span class="badge">חלק ב׳ – מבחן אמיתי</span><h2>חיבור מספרים ואותיות לסירוגין</h2><p>כעת תתחיל/י את המבחן האמיתי.</p><div class="example">1 ← א ← 2 ← ב ← 3 ← ג ← ...</div><p>המשך/י עד לסוף הרצף.</p><p style="color:#c62828;">⏱ הזמן יימדד מרגע שתלחץ/י "המשך".</p></div>`);
const tmtBReal = makeTmt('חלק ב׳ – חבר/י לסירוגין: 1 ← א ← 2 ← ב ← ...', 'real', 'B', buildBTargets(13, true), '13', 300);

jsPsych.run([welcome, instrAPractice, tmtAPractice, instrAReal, tmtAReal, instrBPractice, tmtBPractice, instrBReal, tmtBReal]);
</script>
</body>
</html>
